{% extends "layout.html" %}

{% block title %}Feedback{% endblock %}

{% block content %}

<h2>💬 Share Your Feedback</h2>

<div class="card-modern" style="max-width:600px; margin:0 auto;">

    <form method="POST">

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ session['user_name'] }}" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="rating">Rating (1-5):</label>
        <select id="rating" name="rating" required>
            <option value="5">⭐⭐⭐⭐⭐ (5)</option>
            <option value="4">⭐⭐⭐⭐ (4)</option>
            <option value="3">⭐⭐⭐ (3)</option>
            <option value="2">⭐⭐ (2)</option>
            <option value="1">⭐ (1)</option>
        </select>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" placeholder="Tell us what you think..." required></textarea>

        <button type="submit" class="btn-modern">Submit Feedback</button>

    </form>

</div>

{% endblock %}
