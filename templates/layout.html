<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>{% block title %}PolyCode{% endblock %}</title>

<script>
(function() {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "light") {
        document.documentElement.classList.add("light-mode");
    }
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="hamburger" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</div>

<div class="sidebar" id="sidebar">

    <div class="logo">
        <i class="fas fa-code"></i> PolyCode
    </div>

    <!-- 🔥 NORMAL LINKS -->
    <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">
        <i class="fas fa-chart-line"></i> Dashboard
    </a>

    <a href="/history" class="{% if active_page == 'history' %}active{% endif %}">
        <i class="fas fa-history"></i> History
    </a>

    <a href="/feedback" class="{% if active_page == 'feedback' %}active{% endif %}">
        <i class="fas fa-comments"></i> Feedback
    </a>

    {% if session.get("user_id") %}
    <a href="/profile" class="{% if active_page == 'profile' %}active{% endif %}">
        <i class="fas fa-user-circle"></i> {{ session["user_name"] }}
    </a>

    <!-- 🔥 ADMIN SECTION (UPDATED 🔥) -->
    {% if session.get("role") == "admin" %}
    <hr style="margin:10px 0;">

    <a href="/admin">
        <i class="fas fa-user-shield"></i> Admin Dashboard
    </a>

    <a href="/admin/users">
        <i class="fas fa-users"></i> Manage Users
    </a>

    <a href="/admin/activity">
        <i class="fas fa-list"></i> User Activity
    </a>

    <a href="/admin/languages">
        <i class="fas fa-code"></i> Manage Languages
    </a>

    <a href="/admin/feedback">
        <i class="fas fa-comments"></i> User Feedback
    </a>
    {% endif %}

    <a href="/logout">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>

    {% else %}
    <a href="/login">
        <i class="fas fa-sign-in-alt"></i> Login
    </a>
    {% endif %}

    <!-- 🌙 THEME -->
    <div class="theme-toggle">
        <button onclick="toggleTheme()" class="theme-btn">
            <i class="fas fa-moon"></i>
            <span>Toggle Theme</span>
        </button>
    </div>

</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
function toggleTheme(){
    document.documentElement.classList.toggle("light-mode");

    if(document.documentElement.classList.contains("light-mode")){
        localStorage.setItem("theme","light");
    } else {
        localStorage.setItem("theme","dark");
    }
}

function toggleSidebar(){
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('active');
}

let lastScrollTop = 0;
window.addEventListener('scroll', function() {
    const sidebar = document.getElementById('sidebar');
    const hamburger = document.querySelector('.hamburger');
    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    if (window.innerWidth <= 768) {
        sidebar.classList.remove('active');
        if (scrollTop > lastScrollTop) {
            // Scrolling down
            sidebar.style.transform = 'translateY(-100%)';
            hamburger.style.transform = 'translateY(-100%)';
        } else {
            // Scrolling up
            sidebar.style.transform = 'translateY(0)';
            hamburger.style.transform = 'translateY(0)';
        }
    }
    lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // For Mobile or negative scrolling
});
</script>

</body>
</html>
