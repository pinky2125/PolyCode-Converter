{% extends "layout.html" %}

{% block title %}Forgot Password - PolyCode{% endblock %}

{% block content %}

<div class="card-modern auth-card" style="max-width:400px; margin:auto; margin-top:80px;">

<h3 style="text-align:center; margin-bottom:25px;">
<i class="fas fa-key"></i> Forgot Password
</h3>

<form method="POST">

{% if not otp_sent %}
<div style="margin-bottom:15px;">
<label>Email Address</label>
<input type="email" name="email" required>
</div>

<button type="submit" class="btn-modern" style="width:100%;">
Send Reset OTP
</button>

{% else %}
<div style="margin-bottom:15px;">
<label>Enter Reset OTP</label>
<input type="text" name="otp" placeholder="Enter OTP sent to your email" required>
</div>

<div style="margin-bottom:20px;">
<label>New Password</label>
<input type="password" name="new_password" required>
</div>

<button type="submit" formaction="/reset-password" class="btn-modern" style="width:100%;">
Reset Password
</button>
{% endif %}

</form>

{% if error %}
<p style="color:red; margin-top:10px; text-align:center;">
{{ error }}
</p>
{% endif %}

<p style="margin-top:15px; text-align:center;">
<a href="/login">Back to Login</a>
</p>

</div>

{% endblock %}
