{% extends "layout.html" %}

{% block title %}Register - PolyCode{% endblock %}

{% block content %}

<div class="card-modern auth-card" style="max-width:400px; margin:auto; margin-top:60px;">

<h3 style="text-align:center; margin-bottom:25px;">
<i class="fas fa-user-plus"></i> Register
</h3>

<form method="POST">

<div style="margin-bottom:15px;">
<label>Full Name</label>
<input type="text" name="name" style="width:100%; padding:8px;">
</div>

<div style="margin-bottom:15px;">
<label>Email</label>
<input type="email" name="email" style="width:100%; padding:8px;">
</div>

<div style="margin-bottom:20px;">
<label>Password</label>
<input type="password" name="password" style="width:100%; padding:8px;">
</div>

<button type="submit" style="width:100%; padding:10px;">
Create Account
</button>

</form>

<p style="margin-top:15px; text-align:center;">
Already have account?
<a href="/login">Login</a>
</p>

</div>

{% endblock %}
